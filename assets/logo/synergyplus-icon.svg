<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SynergyPlus icon">
  <title>SynergyPlus — Synergy Orbit</title>
  <style>
    :root {
      --sp-teal:   #0E9E8E;  /* synergy hub */
      --sp-blue:   #0082C4;  /* EnergyPlus plus */
      --sp-green:  #009D57;  /* EnergyPlus orbit */
      --sp-ink:    #0B1F2A;
    }
  </style>

  <!-- green orbit ellipse: the signature EnergyPlus swoosh, now a full orbit -->
  <g fill="none" stroke="#009D57" stroke-width="9" stroke-linecap="round">
    <ellipse cx="128" cy="128" rx="98" ry="58" transform="rotate(-28 128 128)"/>
  </g>

  <!-- three orbiting worker nodes converging on the hub (synergy) -->
  <g fill="#0E9E8E">
    <circle cx="44"  cy="92"  r="15"/>
    <circle cx="212" cy="164" r="15"/>
    <circle cx="150" cy="46"  r="13"/>
  </g>
  <!-- connective spokes into the hub -->
  <g stroke="#0E9E8E" stroke-width="6" stroke-linecap="round" opacity="0.55">
    <line x1="44"  y1="92"  x2="120" y2="120"/>
    <line x1="212" y1="164" x2="136" y2="136"/>
    <line x1="150" y1="46"  x2="124" y2="116"/>
  </g>

  <!-- central plus hub (the EnergyPlus "+") -->
  <g>
    <circle cx="128" cy="128" r="40" fill="#0082C4"/>
    <g fill="#ffffff">
      <rect x="121" y="104" width="14" height="48" rx="4"/>
      <rect x="104" y="121" width="48" height="14" rx="4"/>
    </g>
  </g>
</svg>
