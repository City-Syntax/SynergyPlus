name: Release to PyPI

# Build and publish both Python packages to PyPI on every version tag.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets required.
# Before the first run, register each project's trusted publisher at
#   https://pypi.org/manage/account/publishing/
# pointing at this repo, workflow file "release-pypi.yml", and the environment
# named below (matrix.environment).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: synergyplus
            dir: sdk/python
            environment: pypi-synergyplus
          - package: synergy-runner
            dir: runner
            environment: pypi-synergy-runner
    environment:
      name: ${{ matrix.environment }}
      url: https://pypi.org/project/${{ matrix.package }}/
    permissions:
      contents: read    # needed for actions/checkout (a permissions block replaces all defaults)
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build "${{ matrix.dir }}" --outdir "${{ matrix.dir }}/dist"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.dir }}/dist
