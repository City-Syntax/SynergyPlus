name: Release images

# Build and push all SynergyPlus container images to GitHub Container Registry
# (ghcr.io) on every version tag, plus on demand.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Images published (under ghcr.io/<owner>/...):
#   synergyplus-apiserver, synergyplus-operator, synergyplus-runner, synergyplus-portal
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: apiserver
            context: .
            dockerfile: Dockerfile.apiserver
            platforms: linux/amd64,linux/arm64
          - name: operator
            context: .
            dockerfile: Dockerfile.operator
            platforms: linux/amd64,linux/arm64
          - name: runner
            context: runner
            dockerfile: runner/Dockerfile
            platforms: linux/amd64,linux/arm64
          # Portal: amd64 only. Next.js/SWC crashes (SIGILL) under QEMU arm64
          # emulation; EKS nodes are amd64 and the local OrbStack demo builds the
          # portal natively via Compose, so the arm64 image isn't needed.
          - name: portal
            context: portal
            dockerfile: portal/Dockerfile
            platforms: linux/amd64
          - name: seed
            context: deploy/seed
            dockerfile: deploy/seed/Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      # ghcr.io requires a lowercase namespace; the owner login may contain uppercase.
      - name: Compute lowercase image name
        id: img
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY_OWNER@L}/synergyplus-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.ref }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
