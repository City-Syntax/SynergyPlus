apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for deploying to EKS (SynergyPlusIAC stack).
#
# The base (config/) carries LOCAL-dev image tags (ghcr.io/synergyplus/*) that
# `make k8s-images` builds for OrbStack and the manifests pull with
# imagePullPolicy: IfNotPresent. That flow must keep working, so we do NOT edit
# the base refs in place — this overlay remaps the operator + apiserver to the
# real images published by .github/workflows/release-images.yml
# (ghcr.io/city-syntax/synergyplus-*), pinned to the current release tag so
# prod is reproducible (and a new tag forces a pull past the base's
# imagePullPolicy: IfNotPresent). The portal references its published image in
# the base; we pin its tag here too. Bump these tags each release.
#
# (The overlay lives under deploy/ rather than config/ because a kustomize
# overlay may not sit inside its own base directory.)
#
# Deploy:  kubectl apply -k deploy/overlays/prod
#
# RUNNER IMAGE: runner pods are created by the operator from RunnerPool CRs;
# kustomize can't remap a CRD field. NOTE: release-images.yml tags the runner
# image by platform SEMVER ONLY (e.g. :0.6.4, :latest) — it does NOT publish a
# per-engineVersion tag, so the operator's historical :<engineVersion> default
# (ADR-0015) resolves to a non-existent tag (e.g. :24.1.0 -> 404). Production
# RunnerPools MUST therefore pin spec.image to a real published tag/digest.

resources:
  - ../../../config # the config/ base kustomization
  - runnerpool.yaml # production RunnerPool (pinned runner image, IRSA S3)

images:
  - name: ghcr.io/synergyplus/operator
    newName: ghcr.io/city-syntax/synergyplus-operator
    newTag: "0.6.4"
  - name: ghcr.io/synergyplus/apiserver
    newName: ghcr.io/city-syntax/synergyplus-apiserver
    newTag: "0.6.4"
  - name: ghcr.io/city-syntax/synergyplus-portal
    newTag: "0.6.4"
