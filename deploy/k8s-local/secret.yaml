# Platform env shared by the operator + apiserver (envFrom), and passed through to
# Runner pods by the operator. Local/demo values; in AWS this comes from Secrets
# Manager via External Secrets + IRSA (no static keys). See docs/PROPOSAL.md / gap analysis.
apiVersion: v1
kind: Secret
metadata:
  name: synergyplus-env
  namespace: synergy-system
type: Opaque
stringData:
  DATABASE_URL: postgres://synergy:synergy@postgres.synergy-system.svc.cluster.local:5432/synergy?sslmode=disable
  S3_ENDPOINT: http://minio.synergy-system.svc.cluster.local:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY: synergy
  S3_SECRET_KEY: synergypass
  S3_BUCKET_MODELS: models
  S3_BUCKET_WEATHER: weather
  S3_BUCKET_RESULTS: results
  SP_LEASE_SECONDS: "90"
  SP_HEARTBEAT_SECONDS: "30"
  SP_ALLOWED_ENGINE_VERSIONS: "24.1.0"
