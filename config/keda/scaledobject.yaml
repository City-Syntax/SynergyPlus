# Sample KEDA ScaledObject for a RunnerPool. The operator generates an
# equivalent object per RunnerPool (internal/controller/runnerpool_controller.go);
# this file documents the shape and lets you apply one by hand for testing.
#
# The trigger uses the eligible-depth query: the claim predicate from
# CONTRACT §2.2 WITHOUT the UPDATE — a count of claimable queued Simulations for
# this engine version, respecting the per-User concurrency cap (ADR-0005). This
# keeps the scaler and the Runner's claim query in agreement: KEDA only scales up
# for work a Runner could actually claim, never for over-cap work.
#
# ADR-0011: the predicate + ordering live in the Postgres function
# app.eligible_simulations(engine_version, user_cap) (db/migrations/0006). The
# query below just counts its rows; the literal '24.1.0'/50 are this sample's
# engine version and per-User cap (the operator substitutes the pool's values).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: runner-eplus-24-1-0
  namespace: synergy-system
  labels:
    synergyplus.io/pool: eplus-24-1-0
spec:
  scaleTargetRef:
    name: runner-eplus-24-1-0   # the operator-managed Deployment
  minReplicaCount: 0
  maxReplicaCount: 200
  triggers:
    - type: postgresql
      metadata:
        connectionFromEnv: DATABASE_URL
        targetQueryValue: "1"
        query: >-
          SELECT count(*) FROM app.eligible_simulations('24.1.0', 50)
