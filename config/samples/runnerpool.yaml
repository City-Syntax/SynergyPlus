apiVersion: synergyplus.io/v1
kind: RunnerPool
metadata:
  name: eplus-24-1-0
  namespace: synergy-system
spec:
  engineVersion: "24.1.0"
  # Pin to a published tag. The runner image is tagged by platform semver
  # (:0.6.2, :latest), NOT by engineVersion — there is no :24.1.0 tag.
  image: ghcr.io/city-syntax/synergyplus-runner:latest
  resources:
    cpu: "1"
    memory: "2Gi"
  minReplicas: 0          # scale-to-zero default
  maxReplicas: 200        # ceiling
  defaultUserConcurrency: 50
